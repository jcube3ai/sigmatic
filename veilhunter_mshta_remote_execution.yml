title: VeilHunter - MSHTA Executing Remote HTA File
id: caa7df3a-91a6-4448-8582-22815c37f595
status: experimental
description: >
  Detects mshta.exe executing an HTA file from a remote URL. MSHTA is
  commonly abused to execute malicious HTML Application files that bypass
  application whitelisting (T1218.005).
references:
  - https://attack.mitre.org/techniques/T1218/005/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.t1218.005
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\mshta.exe'
    CommandLine|contains:
      - 'http://'
      - 'https://'
      - 'javascript:'
      - 'vbscript:'
  condition: selection
falsepositives:
  - Very rare — mshta.exe rarely has legitimate network access needs
level: high
