title: VeilHunter - Admin Share Accessed from Remote Host
id: f4bb5c1d-8e37-4308-8599-422cd23c7e7b
status: experimental
description: >
  Detects access to Windows admin shares (C$, ADMIN$, IPC$) from a
  remote IP address. While common in managed environments, unexpected
  access is a strong lateral movement indicator (T1021.002).
references:
  - https://attack.mitre.org/techniques/T1021/002/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.lateral_movement
  - attack.t1021.002
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 5140
    ShareName|contains:
      - 'C$'
      - 'ADMIN$'
      - 'IPC$'
  filter_localhost:
    IpAddress:
      - '127.0.0.1'
      - '::1'
      - '-'
  condition: selection and not filter_localhost
falsepositives:
  - Domain admins performing legitimate remote management
level: medium
