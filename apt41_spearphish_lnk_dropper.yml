title: APT41 - Spear Phishing LNK or ISO Dropper Execution
id: ee08ff09-aa01-4bb0-cc02-00aa00bb0ee
status: experimental
description: >
  Detects execution of payloads via LNK shortcut or ISO/IMG mounted files,
  consistent with APT41 spear phishing techniques targeting law firms and
  trade associations. APT41 was attributed to spear phishing campaigns
  targeting US law firms and government agencies using emails purporting to
  be from Congress members. LNK-based delivery is their documented initial
  access method for this campaign (T1566.001 / T1204.002).
references:
  - https://socradar.io/blog/top-10-apt-groups-in-2025/
  - https://attack.mitre.org/groups/G0096/
  - https://attack.mitre.org/techniques/T1566/001/
author: VeilHunter - Legal Sector APT
date: 2026-03-25
tags:
  - attack.initial_access
  - attack.execution
  - attack.t1566.001
  - attack.t1204.002
  - attack.t1553.005
  - tlp.white
  - actor.apt41
  - sector.legal
logsource:
  product: windows
  category: process_creation
detection:
  selection_lnk_exec:
    ParentImage|endswith: '\explorer.exe'
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\wscript.exe'
      - '\mshta.exe'
      - '\rundll32.exe'
    ParentCommandLine|contains: '.lnk'
  selection_iso_mount:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\wscript.exe'
    ParentCommandLine|contains:
      - '.iso'
      - '.img'
      - '.vhd'
  condition: selection_lnk_exec or selection_iso_mount
falsepositives:
  - Legitimate LNK shortcuts in email attachments from known senders
level: high
