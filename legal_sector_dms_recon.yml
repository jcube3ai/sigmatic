title: Legal Sector - Document Management System Reconnaissance
id: cc03dd04-ee05-4ff0-0011-00ee00ff0cc
status: experimental
description: >
  Detects enumeration of legal document management systems (iManage, NetDocuments,
  OpenText, Worldox, Clio) which are high-value targets in law firm compromises.
  Adversaries targeting law firms specifically seek DMS access to exfiltrate
  privileged client communications, matter files, and litigation strategy
  documents. Any unexpected process accessing DMS directories or APIs should
  be investigated (T1005 / T1213).
references:
  - https://www.halcyon.ai/ransomware-alerts/inc-ransom-group-mounts-rapid-campaign-against-law-firms
  - https://attack.mitre.org/techniques/T1213/
author: VeilHunter - Legal Sector APT
date: 2026-03-25
tags:
  - attack.collection
  - attack.t1005
  - attack.t1213
  - sector:legal
logsource:
  product: windows
  category: process_creation
detection:
  selection_dms_enum:
    CommandLine|contains:
      - 'iManage'
      - 'NetDocuments'
      - 'OpenText'
      - 'Worldox'
      - 'Clio'
      - 'FileSite'
      - 'WorkSite'
      - 'ProLaw'
      - 'Relativity'
      - 'Aderant'
      - 'Elite'
    Image|endswith:
      - '\powershell.exe'
      - '\cmd.exe'
      - '\wmic.exe'
      - '\net.exe'
  condition: selection_dms_enum
falsepositives:
  - Legitimate DMS administrators running management commands
level: medium
