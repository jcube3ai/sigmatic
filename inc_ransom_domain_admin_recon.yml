title: INC Ransom - Domain Admin Reconnaissance
id: f2a3b4c5-d6e7-8901-fabc-012345678901
status: stable
description: Detects domain administrator reconnaissance commands observed in
  INC ransomware intrusions, used to identify privileged accounts before
  lateral movement.
author: jcube3ai
date: 2026-04-07
tags:
  - attack.discovery
  - attack.t1069.002
  - attack.t1087.002
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\net.exe'
      - '\net1.exe'
      - '\nltest.exe'
      - '\dsquery.exe'
      - '\adfind.exe'
    CommandLine|contains:
      - 'domain admins'
      - 'enterprise admins'
      - 'domain controllers'
      - '/dclist'
      - '/trusted_domains'
      - 'group "Domain Admins"'
      - 'group "Enterprise Admins"'
  condition: selection
falsepositives:
  - Legitimate IT admin scripts performing AD inventory
level: high
