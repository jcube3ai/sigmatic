title: VeilHunter - RDP Enabled via Registry Modification
id: fd820774-b4b1-4eb6-8d5d-879171af6159
status: experimental
description: >
  Detects the fDenyTSConnections registry value being set to 0, which
  enables Remote Desktop. Adversaries enable RDP on compromised systems
  to maintain remote access (T1021.001 / T1112).
references:
  - https://attack.mitre.org/techniques/T1021/001/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.lateral_movement
  - attack.defense_evasion
  - attack.t1021.001
  - attack.t1112
logsource:
  product: windows
  category: registry_set
detection:
  selection:
    TargetObject|endswith: '\Terminal Server\fDenyTSConnections'
    Details: 'DWORD (0x00000000)'
  condition: selection
falsepositives:
  - IT admins enabling RDP intentionally
level: medium
