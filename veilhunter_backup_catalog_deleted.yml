title: VeilHunter - Windows Backup Catalog Deleted
id: d4e5f6a7-0503-4b7c-1d2e-9d34ba4a0503
status: experimental
description: >
  Detects wbadmin being used to delete the Windows backup catalog.
  This prevents recovery from Windows Server Backup and is a common
  ransomware preparation step (T1490).
references:
  - https://attack.mitre.org/techniques/T1490/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.impact
  - attack.t1490
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\wbadmin.exe'
    CommandLine|contains:
      - 'delete'
      - 'catalog'
  condition: selection
falsepositives:
  - Authorised backup management operations
level: high
