title: VeilHunter - SAM / SECURITY / SYSTEM Hive Saved to Disk
id: c3d4e5f6-0103-4a6b-0c1d-dc3f04b50103
status: experimental
description: >
  Detects an attempt to save the SAM, SECURITY, or SYSTEM registry hives
  to disk using reg.exe. These hives contain password hashes and LSA secrets.
  Mapped to T1003.002.
references:
  - https://attack.mitre.org/techniques/T1003/002/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.credential_access
  - attack.t1003.002
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\reg.exe'
    CommandLine|contains: 'save'
    CommandLine|contains:
      - 'hklm\sam'
      - 'hklm\security'
      - 'hklm\system'
      - 'HKLM\SAM'
      - 'HKLM\SECURITY'
      - 'HKLM\SYSTEM'
  condition: selection
falsepositives:
  - Backup scripts — rare, and should be documented/scheduled
level: high
