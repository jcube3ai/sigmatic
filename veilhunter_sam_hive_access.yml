title: VeilHunter - SAM Hive Access
id: 21e3e5aa-7471-44e7-836e-e94ce8cb66c7
status: stable
description: Detects suspicious access to the SAM registry hive, commonly used
  for credential dumping via reg save or esentutl.
author: jcube3ai
date: 2026-04-07
tags:
  - attack.credential_access
  - attack.t1003.002
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\reg.exe'
      - '\esentutl.exe'
    CommandLine|contains:
      - 'sam'
      - 'SYSTEM'
      - 'security'
      - 'hklm'
  filter_legit:
    CommandLine|contains:
      - 'backup'
      - 'restore'
  condition: selection and not filter_legit
falsepositives:
  - Legitimate backup software accessing registry hives
level: high
