title: VeilHunter - Windows Security Event Log Cleared
id: ec1754b3-2e7b-493c-9708-5bf7a17de9d9
status: experimental
description: >
  Detects the clearing of the Windows Security event log (EventID 1102).
  Adversaries clear event logs to remove forensic evidence of their
  activity (T1070.001). This is a near-zero false positive rule.
references:
  - https://attack.mitre.org/techniques/T1070/001/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.defense_evasion
  - attack.t1070.001
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 1102
  condition: selection
falsepositives:
  - Authorised log management scripts during maintenance windows
level: high
