title: VeilHunter - Browser Credential Database Accessed by Unexpected Process
id: 5b76ad25-e540-404f-9d1e-8de7b080c61f
status: experimental
description: >
  Detects access to browser credential SQLite databases (Chrome, Edge,
  Firefox Login Data) by a process that is not the browser itself.
  Adversaries read these files to extract saved passwords (T1555.003).
references:
  - https://attack.mitre.org/techniques/T1555/003/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.t1555.003
logsource:
  product: windows
  category: file_access
detection:
  selection:
    TargetFilename|contains:
      - '\Google\Chrome\User Data\Default\Login Data'
      - '\Microsoft\Edge\User Data\Default\Login Data'
      - '\Mozilla\Firefox\Profiles\'
    TargetFilename|endswith:
      - 'Login Data'
      - 'logins.json'
      - 'key4.db'
  filter_browsers:
    Image|contains:
      - '\chrome.exe'
      - '\msedge.exe'
      - '\firefox.exe'
  condition: selection and not filter_browsers
falsepositives:
  - Password managers, backup tools
level: high
