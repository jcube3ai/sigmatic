title: VeilHunter - PSExec-Style Service Installed
id: 8c8d7721-5672-4396-93a3-94e9a8cc3ebf
status: experimental
description: >
  Detects the installation of a PSEXESVC, paexec, or remcom service,
  which indicates remote code execution via Sysinternals PsExec or
  similar tools. Mapped to T1569.002.
references:
  - https://attack.mitre.org/techniques/T1569/002/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.t1569.002
logsource:
  product: windows
  service: system
detection:
  selection:
    EventID: 7045
    ServiceName|contains:
      - 'PSEXESVC'
      - 'paexec'
      - 'remcom'
      - 'csexec'
  condition: selection
falsepositives:
  - Authorised use of PsExec by sysadmins during maintenance
level: high
