title: VeilHunter - Boot Recovery Disabled via bcdedit
id: bbaa6c1a-e7f8-4ee9-981d-9afdeaac192f
status: experimental
description: >
  Detects bcdedit being used to disable Windows boot recovery options.
  This is a standard ransomware pre-encryption step to prevent victims
  from recovering the system after encryption (T1490).
references:
  - https://attack.mitre.org/techniques/T1490/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.impact
  - attack.t1490
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\bcdedit.exe'
    CommandLine|contains:
      - 'recoveryenabled'
      - 'bootstatuspolicy'
      - 'ignoreallfailures'
  condition: selection
falsepositives:
  - Administrators intentionally modifying boot configuration
level: high
