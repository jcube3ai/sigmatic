title: Vidar Infostealer - Wextract IXP Temp Directory Child Process Execution
id: 9777df1d-bd9f-4ae8-94f1-c06090b48fe2
status: stable
description: Detects process execution originating from an IXP###.TMP directory
  under %TEMP%, indicating a self-extracting cabinet dropped by wextract.exe. Combined
  with Vidar delivery via bloated legitimate binaries, this pattern is a reliable
  pre-execution indicator.
author: jcube3ai
date: 2026-04-06
tags:
  - attack.t1059.003
  - attack.t1036.005
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CurrentDirectory|re: '(?i)\\Temp\\IXP[0-9]{3}\.TMP\\'
  suspicious_child:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
      - '\rundll32.exe'
  condition: selection and suspicious_child
falsepositives:
  - Legitimate self-extracting installers that spawn cmd (tune with ParentImage allowlist
    for known software vendors)
level: high
