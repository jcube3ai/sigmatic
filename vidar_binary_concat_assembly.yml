title: Vidar Infostealer - DLL Reassembly via Copy Binary Concatenation
id: d4feb489-83d6-480f-bf73-561598144670
status: stable
description: Detects the use of copy /b to concatenate multiple files with non-binary
  extensions into a single output file, used by Vidar to reassemble DLL fragments
  disguised as image files at runtime.
author: jcube3ai
date: 2026-04-06
tags:
  - attack.defense_evasion
  - attack.t1027.004
  - attack.execution
  - attack.t1059.003
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\cmd.exe'
    CommandLine|contains|all:
      - 'copy'
      - '/b'
  multi_file:
    CommandLine|re: '(\.gif|\.jpg|\.jpeg|\.png|\.bmp)\s*\+'
  condition: selection and multi_file
falsepositives:
  - Legitimate binary patching tools in developer environments (tune by parent process)
level: high
