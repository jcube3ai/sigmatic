title: VeilHunter - Windows Defender Disabled via Registry
id: 61f70440-6abf-4821-ae78-4b3653022fd0
status: experimental
description: >
  Detects the DisableAntiSpyware or DisableRealtimeMonitoring registry
  values being set under Windows Defender policy keys. This is a common
  pre-execution step for malware to avoid detection (T1562.001).
references:
  - https://attack.mitre.org/techniques/T1562/001/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.t1562.001
logsource:
  product: windows
  category: registry_set
detection:
  selection_disable:
    TargetObject|endswith: '\Windows Defender\DisableAntiSpyware'
    Details: 'DWORD (0x00000001)'
  selection_rtp:
    TargetObject|endswith: '\Windows Defender\Real-Time Protection\DisableRealtimeMonitoring'
    Details: 'DWORD (0x00000001)'
  condition: selection_disable or selection_rtp
falsepositives:
  - Managed environments explicitly disabling Defender in favor of another AV
level: high
