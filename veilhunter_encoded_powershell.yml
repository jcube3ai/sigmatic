title: VeilHunter - PowerShell Encoded Command Execution
id: 51f6cda1-9a15-47d4-9429-56c951c94b4c
status: experimental
description: >
  Detects PowerShell being invoked with an encoded command (-EncodedCommand
  or -enc). While sometimes legitimate, this is the most common obfuscation
  technique used by adversaries to hide malicious scripts (T1027.010 / T1059.001).
references:
  - https://attack.mitre.org/techniques/T1027/010/
  - https://attack.mitre.org/techniques/T1059/001/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.t1027.010
  - attack.t1059.001
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - '-EncodedCommand'
      - '-encodedcommand'
      - ' -enc '
      - ' -ec '
  condition: selection
falsepositives:
  - Some legitimate tools use encoded commands (SCCM, Chocolatey)
level: medium
