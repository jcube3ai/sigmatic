title: VeilHunter - Credential-Themed File Created in User Directory
id: b8c9d0e1-0108-4f1a-5b6c-2b8454a00108
status: experimental
description: >
  Detects the creation of files with names suggesting stored credentials
  (password, creds, id_rsa, .kdbx, .pfx, .pem, .ppk) in user-accessible
  locations. May indicate credential staging for exfiltration (T1552.001).
references:
  - https://attack.mitre.org/techniques/T1552/001/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.credential_access
  - attack.t1552.001
logsource:
  product: windows
  category: file_event
detection:
  selection:
    TargetFilename|contains:
      - '\Desktop\'
      - '\Documents\'
      - '\Downloads\'
      - '\Temp\'
    TargetFilename|contains:
      - 'password'
      - 'passwd'
      - 'credentials'
      - 'id_rsa'
      - 'id_dsa'
      - '.kdbx'
      - '.pfx'
      - '.pem'
      - '.ppk'
  condition: selection
falsepositives:
  - Security engineers managing test credentials
level: medium
