title: Legal Sector - Bulk Document Access
id: e8f9a0b1-c2d3-4e5f-6a7b-8c9d0e1f2a3b
status: stable
description: Detects bulk access to documents in legal document management
  systems, indicative of data staging or insider threat activity.
author: jcube3ai
date: 2026-04-07
tags:
  - attack.t1213
logsource:
  category: file_event
  product: windows
detection:
  selection:
    TargetFilename|contains:
      - '\NetDocs\'
      - '\iManage\'
      - '\Worldox\'
      - '\OpenText\'
      - '.docx'
      - '.pdf'
      - '.msg'
  condition: selection
falsepositives:
  - Legitimate bulk export by authorized staff
level: medium
