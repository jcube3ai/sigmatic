title: VeilHunter - Scheduled Task Executing LOLBin or Encoded Command
id: d4e5f6a7-0004-4b7c-1d2e-3f4a5b6c7d8e
status: experimental
description: >
  Detects a scheduled task whose command line references a known
  living-off-the-land binary or contains a base64-encoded PowerShell
  command. Strong indicator of persistence via T1053.005.
references:
  - https://attack.mitre.org/techniques/T1053/005/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.persistence
  - attack.execution
  - attack.t1053.005
logsource:
  product: windows
  category: process_creation
detection:
  selection_schtasks:
    Image|endswith: '\schtasks.exe'
    CommandLine|contains: '/create'
  selection_lolbin_action:
    CommandLine|contains:
      - 'mshta.exe'
      - 'wscript.exe'
      - 'cscript.exe'
      - 'rundll32.exe'
      - 'regsvr32.exe'
      - 'certutil.exe'
      - '-EncodedCommand'
      - '-enc '
      - 'powershell -w hidden'
      - '\Temp\'
      - '\AppData\'
  condition: selection_schtasks and selection_lolbin_action
falsepositives:
  - Rare but possible in legitimate admin scripts
level: high
