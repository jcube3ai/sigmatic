name: Sigma Detection-as-Code Pipeline

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── JOB 1: VALIDATE ───────────────────────────────────────
  validate:
    name: Validate Sigma Rules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt --use-deprecated=legacy-resolver

      - name: Debug installed versions
        run: |
          echo "=== Key package versions ==="
          pip show pySigma sigma-cli pySigma-backend-splunk \
            pySigma-backend-crowdstrike pySigma-backend-cortexxdr \
            2>/dev/null | grep -E "^Name|^Version"
          echo ""
          echo "=== Available backends ==="
          sigma plugin list --plugin-type backend || true

      - name: Lint YAML syntax
        run: |
          echo "Running yamllint on all Sigma rules..."
          find . -name "*.yml" \
            -not -path "./.github/*" \
            -not -name ".yamllint.yml" \
            | sort \
            | xargs yamllint -c .yamllint.yml
          echo "YAML lint passed."

      - name: Validate Sigma rule structure
        run: |
          echo "Validating Sigma rules with sigma-cli..."
          ERROR_COUNT=0
          while IFS= read -r rule; do
            echo "→ Checking $rule"
            result=$(sigma check "$rule" 2>&1) || true
            echo "$result"
            if echo "$result" | grep -qE "Found [1-9][0-9]* errors"; then
              echo "❌ HARD ERROR in: $rule"
              ERROR_COUNT=$((ERROR_COUNT + 1))
            fi
          done < <(find . -name "*.yml" \
            -not -path "./.github/*" \
            -not -name ".yamllint.yml" \
            | sort)
          echo ""
          echo "=== Validation Summary ==="
          echo "Hard errors found: $ERROR_COUNT"
          if [ $ERROR_COUNT -gt 0 ]; then
            echo "❌ Pipeline failed due to $ERROR_COUNT hard rule error(s)"
            exit 1
          fi
          echo "✅ All Sigma rules passed validation."

      - name: Count rules by directory
        run: |
          echo "=== Rule counts by category ==="
          for dir in tactics/persistence tactics/credential_access \
                     tactics/lateral_movement tactics/defense_evasion \
                     tactics/execution tactics/c2_exfil tactics/impact \
                     threat-actor sector delivery; do
            count=$(find $dir -name "*.yml" 2>/dev/null | wc -l)
            echo "$dir: $count rules"
          done
          echo ""
          total=$(find . -name "*.yml" \
            -not -path "./.github/*" \
            -not -name ".yamllint.yml" | wc -l)
          echo "Total: $total rules"

  # ── JOB 2: CONVERT ────────────────────────────────────────
  convert:
    name: Convert to Platform Query Languages
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt --use-deprecated=legacy-resolver

      - name: Build rule list
        run: |
          find . -name "*.yml" \
            -not -path "./.github/*" \
            -not -name ".yamllint.yml" \
            | sort > /tmp/rule_list.txt
          echo "Found $(wc -l < /tmp/rule_list.txt) rules to convert"
          cat /tmp/rule_list.txt

      - name: Debug available backends
        run: |
          echo "=== Installed backends ==="
          sigma plugin list --plugin-type backend || true
          echo ""
          echo "=== Installed pipelines ==="
          sigma plugin list --plugin-type pipeline || true

      - name: Convert rules to Splunk SPL
        run: |
          mkdir -p output/splunk
          echo "Converting to Splunk SPL..."
          xargs sigma convert \
            -t splunk \
            --without-pipeline \
            --skip-unsupported \
            -o output/splunk/sigmatic_splunk.conf \
            < /tmp/rule_list.txt
          echo "Splunk: $(wc -l < output/splunk/sigmatic_splunk.conf) lines generated"

      - name: Convert rules to CrowdStrike Falcon LogScale
        run: |
          mkdir -p output/crowdstrike
          echo "Converting to CrowdStrike Falcon LogScale..."
          xargs sigma convert \
            -t log_scale \
            --without-pipeline \
            --skip-unsupported \
            -o output/crowdstrike/sigmatic_crowdstrike.spl \
            < /tmp/rule_list.txt \
            && echo "CrowdStrike: $(wc -l < output/crowdstrike/sigmatic_crowdstrike.spl) lines generated" \
            || echo "⚠️ CrowdStrike target name may have changed - check debug output"
          touch output/crowdstrike/sigmatic_crowdstrike.spl

      - name: Convert rules to Cortex XSIAM XQL
        run: |
          mkdir -p output/xsiam
          echo "Converting to Cortex XSIAM XQL..."
          xargs sigma convert \
            -t cortex_xdr \
            --without-pipeline \
            --skip-unsupported \
            -o output/xsiam/sigmatic_xsiam.xql \
            < /tmp/rule_list.txt \
            && echo "XSIAM: $(wc -l < output/xsiam/sigmatic_xsiam.xql) lines generated" \
            || echo "⚠️ XSIAM conversion had issues - check debug output"
          touch output/xsiam/sigmatic_xsiam.xql

      - name: Convert rules to Microsoft Sentinel KQL
        run: |
          mkdir -p output/sentinel
          echo "Converting to Microsoft Sentinel KQL..."
          xargs sigma convert \
            -t kusto \
            --without-pipeline \
            --skip-unsupported \
            -o output/sentinel/sigmatic_sentinel.kql \
            < /tmp/rule_list.txt \
            && echo "Sentinel: $(wc -l < output/sentinel/sigmatic_sentinel.kql) lines generated" \
            || echo "⚠️ Sentinel target name may have changed - check debug output"
          touch output/sentinel/sigmatic_sentinel.kql

      - name: Generate conversion summary
        run: |
          echo "## Conversion Summary" > output/SUMMARY.md
          echo "" >> output/SUMMARY.md
          echo "| Platform | Output File | Lines |" >> output/SUMMARY.md
          echo "|----------|-------------|-------|" >> output/SUMMARY.md
          for platform in splunk crowdstrike xsiam sentinel; do
            file=$(ls output/$platform/ 2>/dev/null | head -1)
            if [ -f "output/$platform/$file" ] && [ -s "output/$platform/$file" ]; then
              lines=$(wc -l < "output/$platform/$file")
              echo "| $platform | $file | $lines |" >> output/SUMMARY.md
            else
              echo "| $platform | no output | 0 |" >> output/SUMMARY.md
            fi
          done
          echo "" >> output/SUMMARY.md
          echo "Total rules: $(wc -l < /tmp/rule_list.txt)" >> output/SUMMARY.md
          cat output/SUMMARY.md

      - name: Verify core artifact
        run: |
          echo "=== Output file sizes ==="
          find output/ -type f | xargs ls -lah
          if [ ! -s output/splunk/sigmatic_splunk.conf ]; then
            echo "ERROR: Splunk output is empty"
            exit 1
          fi
          echo "OK: Core Splunk artifact has content"

      - name: Upload converted rules as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sigmatic-converted-rules-${{ github.sha }}
          path: output/
          if-no-files-found: warn
          retention-days: 30

  # ── JOB 3: PR COMMENT ─────────────────────────────────────
  pr-summary:
    name: Post PR Summary
    runs-on: ubuntu-latest
    needs: convert
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: sigmatic-converted-rules-${{ github.sha }}
          path: output/

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '';
            try {
              summary = fs.readFileSync('output/SUMMARY.md', 'utf8');
            } catch (e) {
              summary = 'Conversion completed — see artifacts for output files.';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Sigmatic DaC Pipeline Results\n\n✅ Validation passed\n✅ Rules converted to multiple platforms\n\n${summary}\n\n📦 Download converted rules from the [Actions artifacts](${context.payload.pull_request.html_url}/checks).`
            });
