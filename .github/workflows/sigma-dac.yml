name: Sigma Detection-as-Code Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── JOB 1: VALIDATE ───────────────────────────────────────
  validate:
    name: Validate Sigma Rules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug sigma install
        run: |
          echo "=== sigma version ==="
          sigma version || true
          echo "=== installed sigma packages ==="
          pip list | grep -i -E "sigma|pysigma"
          echo "=== available pipelines ==="
          sigma list pipelines || true

      - name: Lint YAML syntax
        run: |
          echo "Running yamllint on all Sigma rules..."
          find . -name "*.yml" \
            -not -path "./.github/*" \
            -not -name ".yamllint.yml" \
            | sort \
            | xargs yamllint -c .yamllint.yml
          echo "✅ YAML lint passed."

      - name: Validate Sigma rule structure
        run: |
          echo "Validating Sigma rules with sigma-cli..."
          mapfile -t RULES < <(find . -name "*.yml" \
            -not -path "./.github/*" \
            -not -name ".yamllint.yml" | sort)

          for rule in "${RULES[@]}"; do
            echo "→ Checking $(basename "$rule")"
            if ! sigma check "$rule"; then
              echo "❌ VALIDATION FAILED on: $rule"
              echo "Full error output:"
              sigma check "$rule" || true
              exit 1
            fi
          done
          echo "✅ All Sigma rules passed validation."

      - name: Count rules by directory
        run: |
          echo "=== Rule counts ==="
          total=$(find . -name "*.yml" -not -path "./.github/*" -not -name ".yamllint.yml" | wc -l)
          echo "Total Sigma rules: $total"
          echo "Rules are located in root + sigma/ subfolders"

  # ── JOB 2: CONVERT ────────────────────────────────────────
  convert:
    name: Convert to Platform Query Languages
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build rule list
        run: |
          find . -name "*.yml" \
            -not -path "./.github/*" \
            -not -name ".yamllint.yml" \
            | sort > /tmp/rule_list.txt
          echo "Found $(wc -l < /tmp/rule_list.txt) rules to convert"

      - name: Debug available pipelines
        run: |
          echo "=== Installed sigma packages ==="
          pip list | grep -i -E "sigma|pysigma"
          echo "=== Available pipelines ==="
          sigma list pipelines || true

      - name: Convert rules to Splunk SPL
        run: |
          mkdir -p output/splunk
          echo "Converting to Splunk SPL..."
          xargs sigma convert \
            -t splunk \
            --without-pipeline \
            --skip-unsupported \
            -o output/splunk/sigmatic_splunk.conf \
            < /tmp/rule_list.txt
          echo "Splunk: $(wc -l < output/splunk/sigmatic_splunk.conf) lines generated"

      - name: Convert rules to Microsoft Sentinel KQL
        run: |
          mkdir -p output/sentinel
          echo "Converting to Microsoft Sentinel KQL..."
          xargs sigma convert \
            -t microsoft365defender \
            --without-pipeline \
            --skip-unsupported \
            -o output/sentinel/sigmatic_sentinel.kql \
            < /tmp/rule_list.txt
          echo "Sentinel: $(wc -l < output/sentinel/sigmatic_sentinel.kql) lines generated"

      - name: Convert rules to Cortex XSIAM XQL
        run: |
          mkdir -p output/xsiam
          echo "Converting to Cortex XSIAM XQL..."
          xargs sigma convert \
            -t cortexxdr \
            --without-pipeline \
            --skip-unsupported \
            -o output/xsiam/sigmatic_xsiam.xql \
            < /tmp/rule_list.txt
          echo "XSIAM: $(wc -l < output/xsiam/sigmatic_xsiam.xql) lines generated"

      - name: Convert rules to QRadar AQL
        run: |
          mkdir -p output/qradar
          echo "Converting to QRadar AQL..."
          xargs sigma convert \
            -t qradar \
            --without-pipeline \
            --skip-unsupported \
            -o output/qradar/sigmatic_qradar.aql \
            < /tmp/rule_list.txt
          echo "QRadar: $(wc -l < output/qradar/sigmatic_qradar.aql) lines generated"

      - name: Generate conversion summary
        run: |
          echo "## Conversion Summary" > output/SUMMARY.md
          echo "" >> output/SUMMARY.md
          echo "| Platform | Output File | Lines |" >> output/SUMMARY.md
          echo "|----------|-------------|-------|" >> output/SUMMARY.md
          for platform in splunk sentinel xsiam qradar; do
            file=$(ls output/$platform/ 2>/dev/null | head -1)
            if [ -f "output/$platform/$file" ]; then
              lines=$(wc -l < "output/$platform/$file")
              echo "| $platform | $file | $lines |" >> output/SUMMARY.md
            else
              echo "| $platform | no output | 0 |" >> output/SUMMARY.md
            fi
          done
          echo "" >> output/SUMMARY.md
          echo "Total rules converted: $(wc -l < /tmp/rule_list.txt)" >> output/SUMMARY.md
          cat output/SUMMARY.md

      - name: Verify artifacts
        run: |
          echo "=== Output file sizes ==="
          find output/ -type f -exec ls -lah {} \;

      - name: Upload converted rules as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sigmatic-converted-rules-${{ github.sha }}
          path: output/
          if-no-files-found: warn
          retention-days: 30

  # ── JOB 3: PR COMMENT ─────────────────────────────────────
  pr-summary:
    name: Post PR Summary
    runs-on: ubuntu-latest
    needs: convert
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: sigmatic-converted-rules-${{ github.sha }}
          path: output/

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = 'Conversion completed — see artifacts for output files.';
            try {
              summary = fs.readFileSync('output/SUMMARY.md', 'utf8');
            } catch (e) {}
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ✅ Sigmatic DaC Pipeline Results\n\n**Validation passed**\n**Rules successfully converted** to SPL, KQL, XQL, and AQL\n\n${summary}\n\n📦 [Download converted rules from Artifacts](${context.payload.pull_request.html_url}/checks)`
            });
