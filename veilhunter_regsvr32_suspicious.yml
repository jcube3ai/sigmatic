title: VeilHunter - Regsvr32 COM Scriptlet Execution
id: e1f2a3b4-0604-4c4d-8e9f-04abc1b10604
status: experimental
description: >
  Detects regsvr32.exe executing a remote scriptlet or a DLL/SCT from a
  suspicious path. The "Squiblydoo" technique abuses regsvr32 to execute
  arbitrary COM scriptlets, bypassing AppLocker (T1218.010).
references:
  - https://attack.mitre.org/techniques/T1218/010/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.execution
  - attack.defense_evasion
  - attack.t1218.010
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\regsvr32.exe'
    CommandLine|contains:
      - '/i:http'
      - '/s /u'
      - '.sct'
      - 'scrobj.dll'
      - '\Temp\'
      - '\AppData\'
  condition: selection
falsepositives:
  - Legitimate COM component registration — unlikely with these argument patterns
level: high
