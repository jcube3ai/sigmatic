title: APT41 - Keylogger Credential Exfiltration
id: d43d5f9f-be85-4f18-a0d2-c355b2bf068c
status: stable
description: Detects file creation patterns associated with APT41 keylogger
  output files staged for credential exfiltration.
author: jcube3ai
date: 2026-04-07
tags:
  - attack.credential_access
  - attack.t1056.001
  - attack.collection
  - attack.t1005
logsource:
  category: file_event
  product: windows
detection:
  selection:
    TargetFilename|contains:
      - 'keylog'
      - 'klog'
      - 'capture'
      - '.kl'
      - 'input_capture'
      - 'clipboard'
  condition: selection
falsepositives:
  - Authorized security monitoring software (tune by process or path)
level: high
