title: APT41 - Keystroke Data or Credential File Staged for Exfiltration
id: bb02cc03-dd04-4ee0-ff05-00dd00ee0bb
status: experimental
description: >
  Detects staging of credential or keylogger output files consistent with
  APT41 espionage operations against law firms. APT41 targets attorney-client
  privileged communications, merger/acquisition details, and litigation
  strategies. Keystroke log files and credential dumps are typically staged
  in temp directories before exfiltration (T1056.001 / T1005).
references:
  - https://attack.mitre.org/groups/G0096/
  - https://attack.mitre.org/techniques/T1056/001/
author: VeilHunter - Legal Sector APT
date: 2026-03-25
tags:
  - attack.collection
  - attack.credential_access
  - attack.t1056.001
  - attack.t1005
  - tlp:white
  - actor:apt41
  - sector:legal
logsource:
  product: windows
  category: file_event
detection:
  selection_keylog_files:
    TargetFilename|contains:
      - '\Temp\'
      - '\AppData\'
      - '\ProgramData\'
    TargetFilename|endswith:
      - '.log'
      - '.dat'
      - '.bin'
      - '.tmp'
    TargetFilename|contains:
      - 'key'
      - 'log'
      - 'capture'
      - 'dump'
      - 'cred'
  filter_legit_apps:
    Image|contains:
      - '\Program Files\'
      - '\Windows\System32\'
  condition: selection_keylog_files and not filter_legit_apps
falsepositives:
  - Legitimate application logs in user directories
level: medium
