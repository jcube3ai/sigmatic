title: VeilHunter - Known LSASS Credential Dumper Tool on Disk
id: ce4b7983-3de4-442a-8526-dd96fa068a3a
status: experimental
description: >
  Detects the creation of a file whose name matches a known LSASS
  credential dumping tool (mimikatz, procdump, nanodump, safetykatz, etc.)
  in a user-accessible directory.
references:
  - https://attack.mitre.org/techniques/T1003/001/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.credential_access
  - attack.t1003.001
logsource:
  product: windows
  category: file_event
detection:
  selection:
    TargetFilename|contains:
      - 'mimikatz'
      - 'mimilib'
      - 'procdump'
      - 'nanodump'
      - 'handlekatz'
      - 'safetykatz'
      - 'dumpert'
      - 'lsassy'
      - 'pypykatz'
      - 'secretsdump'
      - 'invoke-mimikatz'
  condition: selection
falsepositives:
  - Security research environments — this is a near-zero false positive rule in production
level: critical
