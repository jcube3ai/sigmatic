title: VeilHunter - IFEO Debugger Hijack
id: 34af5675-f331-4b08-981b-6bfad69a3842
status: experimental
description: >
  Detects a Debugger value being set under Image File Execution Options
  (IFEO) for a process name. Adversaries use this to redirect execution
  of a target process to a malicious binary (T1546.012).
references:
  - https://attack.mitre.org/techniques/T1546/012/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.t1546.012
logsource:
  product: windows
  category: registry_set
detection:
  selection:
    TargetObject|contains: '\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\'
    TargetObject|endswith: '\Debugger'
  condition: selection
falsepositives:
  - Legitimate debuggers configured for development purposes
  - Some AV/EDR products set IFEO keys
level: high
