title: VeilHunter - Office Application Spawning LOLBin (Macro Execution)
id: a0ab0cd1-cd3e-4432-bbc1-3201fd54f469
status: experimental
description: >
  Detects Microsoft Office applications (Word, Excel, Outlook, PowerPoint)
  spawning known LOLBins or scripting engines. This is a strong indicator
  of malicious macro execution (T1566.001 / T1204.002 / T1059).
references:
  - https://attack.mitre.org/techniques/T1566/001/
  - https://attack.mitre.org/techniques/T1059/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.t1566.001
  - attack.t1204.002
logsource:
  product: windows
  category: process_creation
detection:
  selection_parent:
    ParentImage|endswith:
      - '\winword.exe'
      - '\excel.exe'
      - '\outlook.exe'
      - '\powerpnt.exe'
      - '\onenote.exe'
      - '\msaccess.exe'
      - '\mspub.exe'
  selection_child:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
      - '\rundll32.exe'
      - '\regsvr32.exe'
      - '\certutil.exe'
      - '\bitsadmin.exe'
      - '\wmic.exe'
  condition: selection_parent and selection_child
falsepositives:
  - Custom Office automation tools in very specific environments
level: critical
