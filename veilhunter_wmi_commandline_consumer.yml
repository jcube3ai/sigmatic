title: VeilHunter - WMI CommandLineEventConsumer Registered
id: 68cf1bde-ba10-4f9b-a80e-c2731328ac13
status: experimental
description: >
  Detects registration of a WMI CommandLineEventConsumer, which executes
  a command when a subscribed event fires. This is the most common WMI
  persistence mechanism used by adversaries and C2 frameworks.
references:
  - https://attack.mitre.org/techniques/T1546/003/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.persistence
  - attack.t1546.003
logsource:
  product: windows
  category: wmi_event
detection:
  selection:
    EventID: 5861
    Message|contains: 'CommandLineEventConsumer'
  condition: selection
falsepositives:
  - SCCM, monitoring agents, antivirus products
level: high
