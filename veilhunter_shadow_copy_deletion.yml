title: VeilHunter - Volume Shadow Copy Deletion
id: b2c3d4e5-0501-4f5a-9b0c-7b1298280501
status: experimental
description: >
  Detects commands used to delete Volume Shadow Copies, a common
  pre-encryption step in ransomware attacks. Covers vssadmin, wmic,
  and PowerShell shadow copy deletion methods (T1490).
references:
  - https://attack.mitre.org/techniques/T1490/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.impact
  - attack.t1490
logsource:
  product: windows
  category: process_creation
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains:
      - 'delete'
      - 'resize'
  selection_wmic_shadow:
    Image|endswith: '\wmic.exe'
    CommandLine|contains:
      - 'shadowcopy'
      - 'delete'
  selection_powershell_shadow:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Win32_ShadowCopy'
      - 'Delete()'
  condition: selection_vssadmin or selection_wmic_shadow or selection_powershell_shadow
falsepositives:
  - Legitimate backup management tools resizing shadow storage
level: high
