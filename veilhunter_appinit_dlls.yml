title: VeilHunter - AppInit_DLLs Value Set
id: dac57fde-9a78-4664-85b2-68804405aa3e
status: experimental
description: >
  Detects a value being written to the AppInit_DLLs registry key.
  DLLs listed here are loaded into every user-mode process, making this
  a high-impact persistence and injection mechanism (T1546.010).
references:
  - https://attack.mitre.org/techniques/T1546/010/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.persistence
  - attack.t1546.010
logsource:
  product: windows
  category: registry_set
detection:
  selection:
    TargetObject|endswith:
      - '\Windows NT\CurrentVersion\Windows\AppInit_DLLs'
      - '\Windows NT\CurrentVersion\Windows\LoadAppInit_DLLs'
    Details|contains: '.dll'
  condition: selection
falsepositives:
  - Very rare — few legitimate products use AppInit_DLLs
level: high
