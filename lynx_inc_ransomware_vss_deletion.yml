title: Lynx / INC Ransomware - Shadow Copy Deletion Pre-Encryption
id: e5cc707b-babb-4672-8cfe-29c29e676791
status: experimental
description: >
  Detects shadow copy and backup deletion commands used by both Lynx
  and INC Ransomware as a pre-encryption step. These commands disable
  recovery mechanisms before file encryption begins. The pattern of
  running multiple backup-destruction commands in sequence within a
  short timeframe is a reliable ransomware indicator (T1490).
references:
  - https://www.picussecurity.com/resource/blog/lynx-ransomware
  - https://attack.mitre.org/techniques/T1490/
author: VeilHunter - Legal Sector APT
date: 2026-03-25
tags:
  - attack.impact
  - attack.t1490
  - actor.lynx_ransomware
  - actor.inc_ransom
  - sector.legal
logsource:
  product: windows
  category: process_creation
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains:
      - 'delete shadows'
      - 'resize shadowstorage'
  selection_wmic_shadow:
    Image|endswith: '\wmic.exe'
    CommandLine|contains:
      - 'shadowcopy delete'
  selection_bcdedit:
    Image|endswith: '\bcdedit.exe'
    CommandLine|contains:
      - 'recoveryenabled no'
      - 'bootstatuspolicy ignoreallfailures'
  selection_wbadmin:
    Image|endswith: '\wbadmin.exe'
    CommandLine|contains: 'delete catalog'
  condition: selection_vssadmin or selection_wmic_shadow or selection_bcdedit or selection_wbadmin
falsepositives:
  - Authorised backup administrators - validate against change management
level: critical
