title: Silent Ransom - Rclone Renamed Binary
id: 6093fdab-af24-4e5d-b6db-c9c74193e864
status: stable
description: Detects execution of rclone with a renamed binary, a technique
  used by Silent Ransom Group to exfiltrate data while evading detection
  by process name.
author: jcube3ai
date: 2026-04-07
tags:
  - attack.exfiltration
  - attack.t1048
  - attack.t1036
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'mega'
      - 'dropbox'
      - 'sftp'
      - 'ftp'
      - '--config'
      - '--transfers'
      - 'copy'
  filter_legit:
    Image|endswith: '\rclone.exe'
  condition: selection and not filter_legit
falsepositives:
  - Legitimate cloud sync tools with similar arguments (tune by parent process)
level: high
