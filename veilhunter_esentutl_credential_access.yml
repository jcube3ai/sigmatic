title: VeilHunter - Esentutl Accessing Credential-Relevant Files
id: 2786158b-a146-4a2a-b050-0af4f3702a6d
status: experimental
description: >
  Detects esentutl.exe being used to access or copy NTDS.dit, SAM,
  SYSTEM, or SECURITY files. Esentutl is a LOLBin that can copy
  locked ESE database files including the Active Directory database (T1003).
references:
  - https://attack.mitre.org/techniques/T1003/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.t1003
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\esentutl.exe'
    CommandLine|contains:
      - 'NTDS'
      - 'ntds.dit'
      - 'SAM'
      - 'SYSTEM'
      - 'SECURITY'
  condition: selection
falsepositives:
  - Database administrators performing authorised NTDS maintenance
level: high
