title: VeilHunter - Rundll32 Suspicious Execution
id: 13d27199-dcdf-409f-8bbf-589f1d82d6bb
status: experimental
description: >
  Detects rundll32.exe executing with arguments that indicate abuse,
  including JavaScript execution, remote URL references, scrobj.dll
  for COM scriptlet execution, or execution from staging paths (T1218.011).
references:
  - https://attack.mitre.org/techniques/T1218/011/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.t1218.011
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\rundll32.exe'
    CommandLine|contains:
      - 'javascript:'
      - 'http://'
      - 'https://'
      - 'scrobj.dll'
      - 'advpack.dll'
      - 'ieadvpack.dll'
      - '\Temp\'
      - '\AppData\'
      - '\ProgramData\'
  condition: selection
falsepositives:
  - Some legitimate software uses rundll32 — review CommandLine carefully
level: high
