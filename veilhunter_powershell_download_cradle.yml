title: VeilHunter - PowerShell Download Cradle
id: cd607c45-d79d-4f52-b1af-3815821d47e6
status: stable
description: Detects PowerShell download cradle patterns commonly used to pull
  and execute remote payloads in memory.
author: jcube3ai
date: 2026-04-07
tags:
  - attack.t1059.001
  - attack.t1027
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\powershell.exe'
    CommandLine|contains:
      - 'IEX'
      - 'Invoke-Expression'
      - 'DownloadString'
      - 'DownloadFile'
      - 'WebClient'
      - 'Net.WebClient'
      - 'bitsadmin'
      - 'Start-BitsTransfer'
  condition: selection
falsepositives:
  - Legitimate admin scripts using WebClient (tune by parent process or user)
level: high
