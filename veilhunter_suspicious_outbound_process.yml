title: VeilHunter - Unexpected Process Making Outbound Network Connection
id: 4626a4ca-59e5-4dd3-9023-31e20fe6e88d
status: experimental
description: >
  Detects a process that does not normally make network connections
  establishing an outbound TCP connection. Covers LOLBins and scripting
  engines making unexpected outbound connections (T1071).
references:
  - https://attack.mitre.org/techniques/T1071/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.command_and_control
  - attack.t1071
logsource:
  product: windows
  category: network_connection
detection:
  selection:
    Initiated: 'true'
    Image|endswith:
      - '\mshta.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\rundll32.exe'
      - '\regsvr32.exe'
      - '\certutil.exe'
      - '\installutil.exe'
      - '\regasm.exe'
      - '\msiexec.exe'
  filter_local:
    DestinationIp|startswith:
      - '10.'
      - '192.168.'
      - '127.'
      - '169.254.'
  condition: selection and not filter_local
falsepositives:
  - certutil checking CRL/OCSP, msiexec downloading MSI packages
level: high
