title: Vidar Infostealer - Image File Executed as Batch Script via CMD Stdin
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: stable
description: Detects cmd.exe using delayed variable expansion to execute an image
  file as a batch script via stdin redirection, a technique used by Vidar infostealer
  to disguise payload execution.
author: jcube3ai
date: 2026-04-06
tags:
  - attack.execution
  - attack.t1059.003
  - attack.defense_evasion
  - attack.t1027
references:
  - https://github.com/jcube3ai/sigmatic
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\cmd.exe'
    CommandLine|contains|all:
      - '/v'
      - '/c'
      - 'Set '
  filter_legit:
    CommandLine|contains:
      - '.bat'
      - '.cmd'
      - '.ps1'
  stdin_image_file:
    CommandLine|re: '<\s*\S+\.(gif|jpg|jpeg|png|bmp|ico|tif)'
  condition: selection and stdin_image_file and not filter_legit
falsepositives:
  - None known
level: critical
