title: VeilHunter - Makecab Used to Archive Sensitive Files
id: d6e7f8a9-0609-4b9c-3d4e-590106060609
status: experimental
description: >
  Detects makecab.exe being used to create an archive containing
  credential-relevant files (NTDS, SAM, SYSTEM). Adversaries use
  makecab as a LOLBin to compress files before exfiltration (T1560.001).
references:
  - https://attack.mitre.org/techniques/T1560/001/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.collection
  - attack.t1560.001
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\makecab.exe'
    CommandLine|contains:
      - 'NTDS'
      - 'ntds.dit'
      - 'SAM'
      - 'SYSTEM'
      - '\Temp\'
      - '\AppData\'
  condition: selection
falsepositives:
  - Authorised backup scripts
level: high
