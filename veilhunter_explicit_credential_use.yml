title: VeilHunter - Explicit Credentials Used for Lateral Movement
id: e1f2a3b4-0203-4c4d-8e9f-5eb787d30203
status: experimental
description: >
  Detects EventID 4648 (logon using explicit credentials) where the
  target server is remote. This pattern is common in lateral movement
  workflows and Pass-the-Hash scenarios (T1021 / T1550.002).
references:
  - https://attack.mitre.org/techniques/T1021/
  - https://attack.mitre.org/techniques/T1550/002/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.lateral_movement
  - attack.t1021
  - attack.t1550.002
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4648
  filter_local:
    TargetServerName: 'localhost'
  filter_machine:
    SubjectUserName|endswith: '$'
  condition: selection and not filter_local and not filter_machine
falsepositives:
  - Administrators using runas or alternate credentials for remote tasks
level: medium
