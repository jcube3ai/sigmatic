title: VeilHunter - Ransom Note File Created
id: 55eadd11-a7e9-4cfd-a680-a9d807473510
status: experimental
description: >
  Detects the creation of files matching common ransomware note naming
  patterns. The appearance of these files indicates that encryption has
  begun or is complete (T1486).
references:
  - https://attack.mitre.org/techniques/T1486/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.t1486
logsource:
  product: windows
  category: file_event
detection:
  selection:
    TargetFilename|contains:
      - 'README'
      - 'HOW_TO_DECRYPT'
      - 'HOW-TO-DECRYPT'
      - 'RESTORE_FILES'
      - 'YOUR_FILES'
      - 'DECRYPT_INSTRUCTION'
      - 'RECOVERY_NOTE'
      - '_READ_ME_'
      - 'RANSOM_NOTE'
    TargetFilename|endswith: '.txt'
  condition: selection
falsepositives:
  - None expected in production environments
level: critical
