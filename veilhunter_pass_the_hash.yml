title: VeilHunter - Pass-the-Hash - NTLM Network Logon
id: f2a3b4c5-0204-4d5e-9f0a-6fc898e40204
status: experimental
description: >
  Detects a Type-3 (network) NTLM logon from a remote IP address for
  a non-machine account. This pattern is characteristic of Pass-the-Hash
  attacks where an adversary authenticates using a captured NTLM hash
  without knowing the plaintext password (T1550.002).
references:
  - https://attack.mitre.org/techniques/T1550/002/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.lateral_movement
  - attack.t1550.002
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4624
    LogonType: 3
    AuthenticationPackageName: 'NTLM'
  filter_machine_accounts:
    TargetUserName|endswith: '$'
  filter_anonymous:
    TargetUserName: 'ANONYMOUS LOGON'
  filter_local:
    IpAddress:
      - '127.0.0.1'
      - '::1'
      - '-'
  condition: selection and not filter_machine_accounts and not filter_anonymous and not filter_local
falsepositives:
  - Legitimate NTLM authentication in environments that have not fully migrated to Kerberos
level: medium
