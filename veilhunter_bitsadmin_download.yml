title: VeilHunter - BITSAdmin Download
id: c9d0e1f2-a3b4-5678-cdef-789012345678
status: stable
description: Detects use of bitsadmin to download files from remote locations,
  a common living-off-the-land technique used for payload staging.
author: jcube3ai
date: 2026-04-07
tags:
  - attack.defense_evasion
  - attack.t1197
  - attack.execution
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\bitsadmin.exe'
    CommandLine|contains:
      - '/transfer'
      - '/download'
      - 'http'
      - 'ftp'
  condition: selection
falsepositives:
  - Legitimate software updates using BITS (tune by known update domains)
level: medium
