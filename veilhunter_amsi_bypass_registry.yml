title: VeilHunter - AMSI Provider Registered or Tampered
id: a7792ce3-6b04-4d34-b853-625c33f56257
status: experimental
description: >
  Detects modification of AMSI provider registry keys. Adversaries modify
  or replace AMSI providers to disable or bypass the Antimalware Scan
  Interface, allowing malicious code to execute unscanned (T1562.001).
references:
  - https://attack.mitre.org/techniques/T1562/001/
author: VeilHunter
date: 2026-03-25
tags:
  - attack.t1562.001
logsource:
  product: windows
  category: registry_set
detection:
  selection:
    TargetObject|contains: '\SOFTWARE\Microsoft\AMSI\Providers\'
  filter_legit_security:
    Image|contains:
      - '\Program Files\Windows Defender\'
      - '\Program Files\Microsoft Security Client\'
  condition: selection and not filter_legit_security
falsepositives:
  - AV/EDR products registering their own AMSI providers
level: high
